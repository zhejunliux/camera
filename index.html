<!DOCTYPE html>
<html lang="cn">

<head>
  <meta http-equiv="X-Clacks-Overhead" content="GNU Terry Pratchett" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera · 4587</title>
  <meta name="description" content="看 — 一个人的影像收藏" />
  <meta property="og:title" content="Camera · 4587" />
  <meta property="og:description" content="看 — 一个人的影像收藏" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://camera.4587.fun/" />
  <link rel="shortcut icon" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e10;
      --bg-soft: #16161a;
      --ink: #e7e3da;
      --ink-dim: #8a867d;
      --line: #2a2a30;
      --accent: #c9a86a;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      flex: 1;
      width: 100%;
      max-width: 76rem;
      margin: 0 auto;
      padding: 10vh 4vw 6vh;
    }

    /* ---- masthead ---- */
    header { text-align: center; margin-bottom: 3.5rem; animation: rise 1s var(--ease) both; }
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    /* ---- masonry gallery (pure CSS columns) ---- */
    .gallery {
      column-count: 4;
      column-gap: 1rem;
      animation: rise 1s var(--ease) 0.15s both;
    }
    @media (max-width: 1100px) { .gallery { column-count: 3; } }
    @media (max-width: 760px)  { .gallery { column-count: 2; } }
    @media (max-width: 460px)  { .gallery { column-count: 1; } }

    .shot {
      break-inside: avoid;
      margin-bottom: 1rem;
      position: relative;
      cursor: zoom-in;
      overflow: hidden;
      background: var(--bg-soft);
      border: 1px solid transparent;
      transition: border-color 0.4s var(--ease);
    }
    .shot img {
      display: block;
      width: 100%;
      height: auto;
      opacity: 0;
      transition: opacity 0.7s var(--ease), transform 0.6s var(--ease);
    }
    .shot img.loaded { opacity: 1; }
    .shot:hover { border-color: var(--accent); }
    .shot:hover img { transform: scale(1.03); }

    .shot .cap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 1.5rem 1rem 0.9rem;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--ink);
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
    }
    .shot:hover .cap { opacity: 1; transform: translateY(0); }

    .empty {
      text-align: center; color: #56534b;
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem;
      padding: 4rem 1rem;
    }

    /* ---- lightbox ---- */
    .lightbox {
      position: fixed; inset: 0; z-index: 40;
      background: rgba(8,8,10,0.96);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s var(--ease);
      cursor: zoom-out;
    }
    .lightbox.open { opacity: 1; pointer-events: auto; }
    .lightbox img {
      max-width: 92vw; max-height: 82vh;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .lightbox .lb-cap {
      margin-top: 1.2rem;
      font-size: 0.9rem; letter-spacing: 0.1em; color: var(--ink-dim);
    }
    .lightbox .nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-family: 'Cormorant Garamond', serif; font-size: 2.5rem;
      color: var(--ink-dim); padding: 1rem 1.4rem; cursor: pointer;
      user-select: none; transition: color 0.3s var(--ease);
    }
    .lightbox .nav:hover { color: var(--accent); }
    .lightbox .prev { left: 1vw; }
    .lightbox .next { right: 1vw; }
    .lightbox .close {
      position: absolute; top: 1.4rem; right: 1.8rem;
      font-family: 'Cormorant Garamond', serif; font-size: 2rem;
      color: var(--ink-dim); cursor: pointer; transition: color 0.3s var(--ease);
    }
    .lightbox .close:hover { color: var(--accent); }

    footer {
      text-align: center; padding: 3rem 1rem 2rem;
      font-size: 0.72rem; letter-spacing: 0.18em; color: #56534b;
    }

    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { header, .gallery { animation: none; } }
  </style>
</head>

<body>
  <main class="wrap">
    <header>
      <h1 class="title">Camera</h1>
    </header>
    <div class="gallery" id="gallery"></div>
  </main>

  <div class="lightbox" id="lightbox">
    <span class="close" id="lbClose">✕</span>
    <span class="nav prev" id="lbPrev">‹</span>
    <img id="lbImg" src="" alt="" />
    <div class="lb-cap" id="lbCap"></div>
    <span class="nav next" id="lbNext">›</span>
  </div>

  <footer>Copyright © 2018–2046 4587 · all rights reserved</footer>

  <script>
    // Gallery comes from photos.json, generated at build time by scanning
    // static/photos/. Add a photo: upload it. Hide one: end its filename
    // with "hide" or "隐藏". No code edits needed.
    let PHOTOS = [];
    const galleryEl = document.getElementById('gallery');
    const lb    = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCap = document.getElementById('lbCap');
    let lbIndex = -1;

    function render() {
      galleryEl.innerHTML = '';
      if (!PHOTOS.length) {
        const d = document.createElement('div');
        d.className = 'empty';
        d.textContent = '还没有照片';
        galleryEl.appendChild(d);
        return;
      }
      PHOTOS.forEach((p, i) => {
        const fig = document.createElement('figure');
        fig.className = 'shot';
        const img = new Image();
        img.loading = 'lazy';
        img.alt = p.title;
        img.src = p.src;
        img.addEventListener('load', () => img.classList.add('loaded'));
        const cap = document.createElement('figcaption');
        cap.className = 'cap';
        cap.textContent = p.title;
        fig.appendChild(img);
        fig.appendChild(cap);
        fig.addEventListener('click', () => openLightbox(i));
        galleryEl.appendChild(fig);
      });
    }

    function openLightbox(i) {
      lbIndex = i;
      const p = PHOTOS[i];
      lbImg.src = p.src;
      lbImg.alt = p.title;
      lbCap.textContent = p.title;
      lb.classList.add('open');
    }
    function closeLightbox() { lb.classList.remove('open'); }
    function step(d) {
      if (!PHOTOS.length) return;
      lbIndex = (lbIndex + d + PHOTOS.length) % PHOTOS.length;
      openLightbox(lbIndex);
    }

    lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', (e) => { e.stopPropagation(); step(-1); });
    document.getElementById('lbNext').addEventListener('click', (e) => { e.stopPropagation(); step(1); });
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') step(-1);
      else if (e.key === 'ArrowRight') step(1);
    });

    fetch('photos.json', { cache: 'no-cache' })
      .then((r) => (r.ok ? r.json() : []))
      .then((data) => { PHOTOS = Array.isArray(data) ? data : []; render(); })
      .catch(() => { PHOTOS = []; render(); });
  </script>
</body>

</html>
